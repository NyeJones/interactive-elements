<div id="box" style="
  width:200px;
  height:200px;
  background:#444;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
">
Click me
</div>

<script>
document.getElementById("box").addEventListener("click", function () {
  this.style.background = this.style.background === "lime" ? "#444" : "lime";
  this.innerText = this.innerText === "Clicked!" ? "Click me" : "Clicked!";
});
</script>
