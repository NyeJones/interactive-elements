<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Click Test</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: sans-serif;
    }

    .box {
      width: 200px;
      height: 200px;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 12px;
    }

    .box.active {
      background: #00ff88;
      color: #111;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="box" onclick="handleClick(this)">
    Click me
  </div>

  <script>
    function handleClick(el) {
      el.classList.toggle("active");
      el.innerText = el.classList.contains("active")
        ? "Clicked!"
        : "Click me";
    }
  </script>

</body>
</html>
